<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Electro Oriente - Reporte de Incidentes</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a1a12; padding-bottom: 20px; }
        
        .header {
            background: linear-gradient(135deg, #0a2b1e, #05140e);
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .header h1 { font-size: 18px; }
        .header p { font-size: 11px; opacity: 0.8; margin-top: 5px; }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }
        
        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        
        .kpi-value { font-size: 28px; font-weight: bold; color: #1a472a; }
        .kpi-title { font-size: 11px; color: #666; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin: 0 15px 15px 15px;
        }
        
        .card h3 {
            margin-bottom: 12px;
            color: #1a472a;
            font-size: 16px;
        }
        
        #map { height: 280px; border-radius: 12px; margin-bottom: 10px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .photo-buttons {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        
        .photo-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .photo-btn.camera { background: #1a472a; color: white; }
        .photo-btn.gallery { background: #6c757d; color: white; }
        
        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .preview-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .btn-primary {
            background: #1a472a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .incident-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid;
            cursor: pointer;
        }
        
        .incident-item.critico { border-left-color: #dc3545; }
        .incident-item.leve { border-left-color: #ffc107; }
        .incident-item.resuelto { border-left-color: #28a745; }
        
        .incident-title { font-weight: bold; }
        .incident-desc { font-size: 12px; color: #666; margin: 5px 0; }
        .incident-photos { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
        .incident-photo-mini { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .incident-footer { font-size: 10px; color: #999; margin-top: 8px; display: flex; justify-content: space-between; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; cursor: pointer; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
            z-index: 1500;
        }
        
        .coord-info {
            font-size: 11px;
            text-align: center;
            background: #e8f5e9;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            margin-bottom: 10px;
        }
        
        button { cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-bolt"></i> Electro Oriente - Incidentes</h1>
    <p>Generación y Transmisión San Martín</p>
</div>

<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-value" id="kpiActivos">0</div><div class="kpi-title">🔴 Activos</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-title">📍 Total</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiFotos">0</div><div class="kpi-title">📸 Fotos</div></div>
</div>

<div class="card">
    <h3><i class="fas fa-map-marker-alt"></i> Mapa - Haz clic para marcar</h3>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar: Tarapoto, Juanjuí, Rioja..." />
    </div>
    <div id="map"></div>
    <div class="coord-info" id="coordInfo">📍 Haz clic en el mapa para seleccionar la ubicación</div>
</div>

<div class="card">
    <h3><i class="fas fa-plus-circle"></i> Reportar incidente</h3>
    
    <div class="form-group">
        <label>📍 Nombre del punto</label>
        <input type="text" id="incidenteNombre" placeholder="Ej: Torre Km 45, Subestación..." />
    </div>
    
    <div class="form-group">
        <label>📏 Coordenadas</label>
        <input type="text" id="incidenteCoords" placeholder="Haz clic en el mapa" readonly />
    </div>
    
    <div class="form-group">
        <label>⚠️ Prioridad</label>
        <select id="incidenteEstado">
            <option value="critico">🔴 CRÍTICO</option>
            <option value="leve">🟡 LEVE</option>
            <option value="resuelto">🟢 RESUELTO</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>📝 Descripción</label>
        <textarea id="incidenteDescripcion" rows="2" placeholder="Describe el problema..."></textarea>
    </div>
    
    <div>
        <label>📸 Fotos</label>
        <div class="photo-buttons">
            <button class="photo-btn camera" onclick="tomarFoto()"><i class="fas fa-camera"></i> Cámara</button>
            <button class="photo-btn gallery" onclick="subirFoto()"><i class="fas fa-image"></i> Galería</button>
        </div>
        <div id="photoPreview" class="photo-preview"></div>
    </div>
    
    <button class="btn-primary" onclick="guardarIncidente()"><i class="fas fa-save"></i> Guardar incidente</button>
</div>

<div class="card">
    <h3><i class="fas fa-list"></i> Mis incidentes reportados</h3>
    <div id="incidentList" style="max-height: 350px; overflow-y: auto;">
        <div style="text-align:center; padding:20px; color:#999;">Cargando...</div>
    </div>
</div>

<div id="imageModal" class="modal" onclick="cerrarModal()">
    <span class="modal-close">&times;</span>
    <img id="modalImage" src="">
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================
    // DATOS - SE GUARDAN EN EL CELULAR (NO SE PIERDEN)
    // ============================================
    let incidentes = [];
    let fotosTemporales = [];
    let map;
    let markers = [];
    
    // Cargar datos guardados al iniciar
    function cargarDatos() {
        let guardados = localStorage.getItem('electro_incidentes_v2');
        if (guardados) {
            incidentes = JSON.parse(guardados);
        } else {
            // Datos de ejemplo
            incidentes = [
                { id: 1, nombre: "Subestación Tarapoto", lat: -6.4875, lng: -76.3747, estado: "resuelto", descripcion: "Operación normal", fecha: new Date().toLocaleString(), fotos: [] },
                { id: 2, nombre: "Banda de Shilcayo", lat: -6.5050, lng: -76.3800, estado: "leve", descripcion: "Sobrecarga detectada", fecha: new Date().toLocaleString(), fotos: [] },
                { id: 3, nombre: "Torre N°12", lat: -6.5100, lng: -76.3750, estado: "critico", descripcion: "Cable dañado - urgente", fecha: new Date().toLocaleString(), fotos: [] }
            ];
        }
        actualizarTodo();
    }
    
    function guardarDatos() {
        localStorage.setItem('electro_incidentes_v2', JSON.stringify(incidentes));
        actualizarTodo();
        mostrarToast("✅ Incidente guardado (no se perderá)");
    }
    
    // ============================================
    // MAPA
    // ============================================
    function initMap() {
        map = L.map('map').setView([-6.4875, -76.3747], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        map.on('click', function(e) {
            document.getElementById('incidenteCoords').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            document.getElementById('coordInfo').innerHTML = `✅ Ubicación: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            
            if (window.tempMarker) map.removeLayer(window.tempMarker);
            window.tempMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
            setTimeout(() => map.removeLayer(window.tempMarker), 1500);
        });
        
        document.getElementById('searchInput').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                let lugar = this.value;
                try {
                    let url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(lugar + ', San Martín')}&format=json&limit=1`;
                    let res = await fetch(url);
                    let data = await res.json();
                    if (data[0]) {
                        map.setView([data[0].lat, data[0].lon], 14);
                        mostrarToast(`📍 ${data[0].display_name.substring(0, 40)}`);
                    }
                } catch(e) { mostrarToast("No se encontró"); }
            }
        });
    }
    
    function cargarMarcadores() {
        if (!map) return;
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        incidentes.forEach(inc => {
            let color = inc.estado === 'critico' ? '#dc3545' : (inc.estado === 'leve' ? '#ffc107' : '#28a745');
            let icono = L.divIcon({
                html: `<div style="background:${color}; width:14px; height:14px; border-radius:50%; border:2px solid white;"></div>`,
                iconSize: [14, 14]
            });
            let marker = L.marker([inc.lat, inc.lng], { icon: icono }).addTo(map);
            markers.push(marker);
        });
    }
    
    // ============================================
    // FOTOS
    // ============================================
    function tomarFoto() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment';
        input.onchange = (e) => procesarFoto(e.target.files[0]);
        input.click();
    }
    
    function subirFoto() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => procesarFoto(e.target.files[0]);
        input.click();
    }
    
    function procesarFoto(file) {
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(e) {
            fotosTemporales.push(e.target.result);
            actualizarPreview();
        };
        reader.readAsDataURL(file);
    }
    
    function actualizarPreview() {
        let container = document.getElementById('photoPreview');
        container.innerHTML = '';
        fotosTemporales.forEach((foto, i) => {
            let div = document.createElement('div');
            div.style.position = 'relative';
            div.innerHTML = `<img src="${foto}" class="preview-img" onclick="verFoto('${foto}')"><div style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:18px; height:18px; text-align:center; font-size:12px; cursor:pointer;" onclick="eliminarFoto(${i})">×</div>`;
            container.appendChild(div);
        });
        if (fotosTemporales.length === 0) container.innerHTML = '<small>Sin fotos</small>';
    }
    
    function eliminarFoto(i) { fotosTemporales.splice(i, 1); actualizarPreview(); }
    function verFoto(src) { document.getElementById('modalImage').src = src; document.getElementById('imageModal').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('imageModal').style.display = 'none'; }
    
    // ============================================
    // GUARDAR INCIDENTE
    // ============================================
    function guardarIncidente() {
        let nombre = document.getElementById('incidenteNombre').value.trim();
        let coords = document.getElementById('incidenteCoords').value.trim();
        let estado = document.getElementById('incidenteEstado').value;
        let descripcion = document.getElementById('incidenteDescripcion').value.trim();
        
        if (!nombre) { mostrarToast("❌ Escribe un nombre"); return; }
        if (!coords) { mostrarToast("❌ Haz clic en el mapa"); return; }
        
        let partes = coords.split(',');
        let lat = parseFloat(partes[0]);
        let lng = parseFloat(partes[1]);
        
        let nuevo = {
            id: Date.now(),
            nombre: nombre,
            lat: lat,
            lng: lng,
            estado: estado,
            descripcion: descripcion || "Sin descripción",
            fecha: new Date().toLocaleString(),
            fotos: [...fotosTemporales]
        };
        
        incidentes.push(nuevo);
        guardarDatos();
        
        // Limpiar
        document.getElementById('incidenteNombre').value = '';
        document.getElementById('incidenteDescripcion').value = '';
        document.getElementById('incidenteCoords').value = '';
        fotosTemporales = [];
        actualizarPreview();
        
        mostrarToast(`✅ Guardado con ${nuevo.fotos.length} foto(s)`);
        if (estado === 'critico') mostrarToast(`🚨 ${nombre} - CRÍTICO`);
    }
    
    // ============================================
    // ACTUALIZAR PANTALLA
    // ============================================
    function actualizarLista() {
        let container = document.getElementById('incidentList');
        if (incidentes.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Sin incidentes</div>';
            return;
        }
        
        container.innerHTML = '';
        [...incidentes].reverse().forEach(inc => {
            let div = document.createElement('div');
            div.className = `incident-item ${inc.estado}`;
            div.innerHTML = `
                <div class="incident-title">${inc.nombre}</div>
                <div class="incident-desc">${inc.descripcion.substring(0, 60)}</div>
                <div class="incident-photos" id="fotos-${inc.id}"></div>
                <div class="incident-footer">
                    <span>${inc.estado === 'critico' ? '🔴 CRÍTICO' : (inc.estado === 'leve' ? '🟡 LEVE' : '🟢 RESUELTO')}</span>
                    <span>📸 ${inc.fotos.length}</span>
                    <span>${inc.fecha.substring(5, 16)}</span>
                </div>
            `;
            div.onclick = () => { map.setView([inc.lat, inc.lng], 16); };
            container.appendChild(div);
            
            let fotosDiv = document.getElementById(`fotos-${inc.id}`);
            if (inc.fotos.length > 0) {
                inc.fotos.slice(0, 3).forEach(f => {
                    let img = document.createElement('img');
                    img.src = f;
                    img.className = 'incident-photo-mini';
                    img.onclick = (e) => { e.stopPropagation(); verFoto(f); };
                    fotosDiv.appendChild(img);
                });
            }
        });
    }
    
    function actualizarContadores() {
        let activos = incidentes.filter(i => i.estado === 'critico' || i.estado === 'leve').length;
        let totalFotos = incidentes.reduce((s, i) => s + i.fotos.length, 0);
        document.getElementById('kpiActivos').innerText = activos;
        document.getElementById('kpiTotal').innerText = incidentes.length;
        document.getElementById('kpiFotos').innerText = totalFotos;
    }
    
    function actualizarTodo() {
        actualizarLista();
        actualizarContadores();
        cargarMarcadores();
    }
    
    function mostrarToast(msg) {
        let toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }
    
    // ============================================
    // INICIAR
    // ============================================
    initMap();
    cargarDatos();
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape') cerrarModal(); });
</script>
</body>
</html>
