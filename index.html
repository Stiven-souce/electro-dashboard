<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Electro Oriente - Incidentes Cloud</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1a12; }
        .header { background: linear-gradient(135deg, #0a2b1e, #05140e); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .btn-icon { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
        .kpi-card { background: white; border-radius: 12px; padding: 10px; text-align: center; }
        .kpi-value { font-size: 24px; font-weight: bold; color: #1a472a; }
        .kpi-title { font-size: 11px; color: #666; }
        .main-container { padding: 12px; gap: 12px; display: flex; flex-direction: column; }
        .map-card, .form-card, .incidents-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        #map { height: 300px; border-radius: 12px; margin-top: 10px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .photo-section { background: #f5f5f5; border-radius: 12px; padding: 12px; margin: 10px 0; }
        .photo-buttons { display: flex; gap: 10px; margin-bottom: 12px; }
        .photo-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .photo-btn.camera { background: #1a472a; color: white; }
        .photo-btn.gallery { background: #6c757d; color: white; }
        .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .preview-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .btn-primary { background: linear-gradient(135deg, #1a472a, #0d2818); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .incident-item { background: #f8f9fa; border-radius: 12px; padding: 12px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid; }
        .incident-item.critico { border-left-color: #dc3545; }
        .incident-item.leve { border-left-color: #ffc107; }
        .incident-item.resuelto { border-left-color: #28a745; }
        .incident-title { font-weight: bold; }
        .incident-desc { font-size: 12px; color: #666; margin: 5px 0; }
        .incident-photos { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
        .incident-photo-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .incident-footer { display: flex; justify-content: space-between; font-size: 10px; color: #999; margin-top: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 90%; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #333; color: white; padding: 12px; border-radius: 12px; text-align: center; display: none; z-index: 1500; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 25px; }
        .coord-info { font-size: 11px; color: #666; margin-top: 8px; text-align: center; background: #e8f5e9; padding: 6px; border-radius: 8px; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-cloud-upload-alt"></i> Electro Oriente - Incidentes Cloud</h1>
    <button class="btn-icon" id="refreshBtn"><i class="fas fa-sync-alt"></i> Sincronizar</button>
</div>

<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-value" id="kpiActivos">0</div><div class="kpi-title">🔴 Activos</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-title">📍 Total</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpiFotos">0</div><div class="kpi-title">📸 Fotos</div></div>
</div>

<div class="main-container">
    <div class="map-card">
        <h3><i class="fas fa-map-marker-alt"></i> Mapa - Haz clic para marcar</h3>
        <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Buscar lugar (Tarapoto, Juanjuí...)" /></div>
        <div id="map"></div>
        <div class="coord-info" id="coordInfo">📍 Haz clic en el mapa para seleccionar la ubicación exacta</div>
    </div>
    
    <div class="form-card">
        <h3><i class="fas fa-plus-circle"></i> Reportar nuevo incidente</h3>
        <div class="form-group"><label>📍 Ubicación</label><input type="text" id="incidenteNombre" placeholder="Ej: Torre Km 45" /></div>
        <div class="form-group"><label>📏 Coordenadas (clic en mapa)</label><input type="text" id="incidenteCoords" placeholder="Haz clic en el mapa" readonly /></div>
        <div class="form-group"><label>⚠️ Estado</label>
            <select id="incidenteEstado">
                <option value="critico">🔴 CRÍTICO</option>
                <option value="leve">🟡 LEVE</option>
                <option value="resuelto">🟢 RESUELTO</option>
            </select>
        </div>
        <div class="form-group"><label>📝 Descripción</label><textarea id="incidenteDescripcion" rows="2" placeholder="Describe el incidente..."></textarea></div>
        
        <div class="photo-section">
            <label><i class="fas fa-camera"></i> 📸 Evidencia fotográfica</label>
            <div class="photo-buttons">
                <button class="photo-btn camera" onclick="tomarFoto()"><i class="fas fa-camera"></i> Tomar foto</button>
                <button class="photo-btn gallery" onclick="subirFoto()"><i class="fas fa-image"></i> Subir foto</button>
            </div>
            <div id="photoPreview" class="photo-preview"></div>
        </div>
        
        <button class="btn-primary" onclick="guardarIncidente()"><i class="fas fa-save"></i> Guardar incidente (se sincroniza en la nube)</button>
    </div>
    
    <div class="incidents-card">
        <h3><i class="fas fa-list"></i> Incidentes reportados (todos los usuarios)</h3>
        <div id="incidentList" style="max-height: 400px; overflow-y: auto;"><div class="loading">Cargando incidentes...</div></div>
    </div>
</div>

<div id="imageModal" class="modal" onclick="cerrarModal()"><span class="modal-close">&times;</span><img id="modalImage" src=""></div>
<div id="toast" class="toast"></div>

<script>
    // ============================================
    // CONFIGURACIÓN DE LA API (¡TU URL AQUÍ!)
    // ============================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwADP2FIVTKtwKjZHyoDPEw0mPghOD6NF5xf_YCs64Z6QsDpFIvHOq7iSYMui0c2bpv/exec";
    
    // ============================================
    // VARIABLES GLOBALES
    // ============================================
    let incidentes = [];
    let fotosTemporales = [];
    let map;
    let markers = [];
    let ubicacionSeleccionada = null;
    
    // ============================================
    // CARGAR INCIDENTES DESDE LA NUBE
    // ============================================
    async function cargarIncidentesCloud() {
        mostrarToast("🔄 Sincronizando desde la nube...");
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (data && data.length > 0) {
                // Convertir los datos de Google Sheets a nuestro formato
                incidentes = data.map((row, index) => {
                    if (index === 0) return null; // Saltar cabecera
                    return {
                        id: index,
                        nombre: row[1] || "Sin nombre",
                        lat: parseFloat(row[2]) || -6.4875,
                        lng: parseFloat(row[3]) || -76.3747,
                        estado: row[4] || "leve",
                        descripcion: row[5] || "Sin descripción",
                        fecha: row[0] || new Date().toLocaleString(),
                        fotos: row[6] ? JSON.parse(row[6]) : []
                    };
                }).filter(i => i !== null);
            }
            
            if (incidentes.length === 0) {
                cargarDatosEjemplo();
            }
            
            actualizarTodo();
            mostrarToast(`✅ ${incidentes.length} incidentes cargados desde la nube`);
            
        } catch (error) {
            console.error("Error:", error);
            mostrarToast("⚠️ Error de conexión, usando datos locales");
            cargarDatosLocales();
        }
    }
    
    function cargarDatosEjemplo() {
        incidentes = [
            { id: 1, nombre: "Subestación Tarapoto", lat: -6.4875, lng: -76.3747, estado: "resuelto", descripcion: "Operación normal", fecha: new Date().toLocaleString(), fotos: [] },
            { id: 2, nombre: "Banda de Shilcayo", lat: -6.5050, lng: -76.3800, estado: "leve", descripcion: "Sobrecarga detectada", fecha: new Date().toLocaleString(), fotos: [] },
            { id: 3, nombre: "Torre N°12", lat: -6.5100, lng: -76.3750, estado: "critico", descripcion: "Cable dañado", fecha: new Date().toLocaleString(), fotos: [] }
        ];
        actualizarTodo();
    }
    
    function cargarDatosLocales() {
        let guardados = localStorage.getItem('incidentes_backup');
        if (guardados) {
            incidentes = JSON.parse(guardados);
        } else {
            cargarDatosEjemplo();
        }
        actualizarTodo();
    }
    
    // ============================================
    // GUARDAR INCIDENTE EN LA NUBE
    // ============================================
    async function guardarIncidenteCloud(nuevoIncidente) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoIncidente)
            });
            
            // Guardar copia local
            let backup = localStorage.getItem('incidentes_backup');
            let todos = backup ? JSON.parse(backup) : [];
            todos.push(nuevoIncidente);
            localStorage.setItem('incidentes_backup', JSON.stringify(todos));
            
            return true;
        } catch (error) {
            console.error("Error al guardar:", error);
            return false;
        }
    }
    
    // ============================================
    // MAPA
    // ============================================
    function initMap() {
        map = L.map('map').setView([-6.4875, -76.3747], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        map.on('click', function(e) {
            ubicacionSeleccionada = { lat: e.latlng.lat, lng: e.latlng.lng };
            document.getElementById('incidenteCoords').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            document.getElementById('coordInfo').innerHTML = `✅ Ubicación: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
        });
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscarLugar(this.value);
        });
    }
    
    async function buscarLugar(direccion) {
        if (!direccion) return;
        try {
            let url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(direccion + ', San Martín, Perú')}&format=json&limit=1`;
            let response = await fetch(url);
            let data = await response.json();
            if (data && data.length > 0) {
                let lat = parseFloat(data[0].lat);
                let lng = parseFloat(data[0].lon);
                map.setView([lat, lng], 14);
                ubicacionSeleccionada = { lat, lng };
                document.getElementById('incidenteCoords').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                mostrarToast(`📍 Encontrado: ${data[0].display_name.substring(0, 50)}`);
            } else {
                mostrarToast('❌ No se encontró');
            }
        } catch(e) { mostrarToast('❌ Error'); }
    }
    
    function cargarMarcadores() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        incidentes.forEach(inc => {
            let color = inc.estado === 'critico' ? '#dc3545' : (inc.estado === 'leve' ? '#ffc107' : '#28a745');
            let icono = L.divIcon({
                html: `<div style="background:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>`,
                iconSize: [16, 16]
            });
            let marker = L.marker([inc.lat, inc.lng], { icon: icono }).addTo(map)
                .bindPopup(`<b>${inc.nombre}</b><br>${inc.estado.toUpperCase()}<br>${inc.descripcion?.substring(0, 50)}`);
            markers.push(marker);
        });
    }
    
    // ============================================
    // CÁMARA Y FOTOS
    // ============================================
    function tomarFoto() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment';
        input.onchange = (e) => { if(e.target.files[0]) procesarFoto(e.target.files[0]); };
        input.click();
    }
    
    function subirFoto() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.multiple = true;
        input.onchange = (e) => { for(let file of e.target.files) procesarFoto(file); };
        input.click();
    }
    
    function procesarFoto(file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            fotosTemporales.push(e.target.result);
            actualizarPreview();
        };
        reader.readAsDataURL(file);
    }
    
    function actualizarPreview() {
        let container = document.getElementById('photoPreview');
        container.innerHTML = '';
        fotosTemporales.forEach((foto, idx) => {
            let div = document.createElement('div');
            div.style.position = 'relative';
            div.style.display = 'inline-block';
            div.innerHTML = `<img src="${foto}" class="preview-img" onclick="verFoto('${foto}')"><div style="position:absolute; top:-8px; right:-8px; background:red; color:white; border-radius:50%; width:20px; height:20px; text-align:center; cursor:pointer; font-size:12px;" onclick="eliminarFoto(${idx})">×</div>`;
            container.appendChild(div);
        });
        if(fotosTemporales.length === 0) container.innerHTML = '<small style="color:#999;">Sin fotos seleccionadas</small>';
    }
    
    function eliminarFoto(idx) { fotosTemporales.splice(idx, 1); actualizarPreview(); }
    function verFoto(src) { document.getElementById('modalImage').src = src; document.getElementById('imageModal').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('imageModal').style.display = 'none'; }
    
    // ============================================
    // GUARDAR INCIDENTE
    // ============================================
    async function guardarIncidente() {
        let nombre = document.getElementById('incidenteNombre').value.trim();
        let coordsText = document.getElementById('incidenteCoords').value.trim();
        let estado = document.getElementById('incidenteEstado').value;
        let descripcion = document.getElementById('incidenteDescripcion').value.trim();
        
        if (!nombre) { mostrarToast('❌ Escribe un nombre'); return; }
        if (!coordsText) { mostrarToast('❌ Haz clic en el mapa'); return; }
        
        let partes = coordsText.split(',');
        let lat = parseFloat(partes[0]);
        let lng = parseFloat(partes[1]);
        if (isNaN(lat) || isNaN(lng)) { mostrarToast('❌ Coordenadas inválidas'); return; }
        
        let nuevoIncidente = {
            id: Date.now(),
            nombre: nombre,
            lat: lat,
            lng: lng,
            estado: estado,
            descripcion: descripcion || "Sin descripción",
            fecha: new Date().toLocaleString(),
            fotos: [...fotosTemporales]
        };
        
        await guardarIncidenteCloud(nuevoIncidente);
        
        incidentes.push(nuevoIncidente);
        
        document.getElementById('incidenteNombre').value = '';
        document.getElementById('incidenteDescripcion').value = '';
        document.getElementById('incidenteCoords').value = '';
        fotosTemporales = [];
        actualizarPreview();
        
        actualizarTodo();
        mostrarToast(`✅ Incidente guardado en la nube con ${nuevoIncidente.fotos.length} foto(s)`);
        if (estado === 'critico') mostrarToast(`🚨 ALERTA: ${nombre} - CRÍTICO`);
    }
    
    // ============================================
    // ACTUALIZAR TODO
    // ============================================
    function actualizarTodo() {
        actualizarLista();
        actualizarContadores();
        cargarMarcadores();
    }
    
    function actualizarLista() {
        let container = document.getElementById('incidentList');
        if (!incidentes.length) {
            container.innerHTML = '<div class="loading">No hay incidentes reportados</div>';
            return;
        }
        
        container.innerHTML = '';
        [...incidentes].reverse().forEach(inc => {
            let div = document.createElement('div');
            div.className = `incident-item ${inc.estado}`;
            div.innerHTML = `
                <div class="incident-title">${inc.nombre}</div>
                <div class="incident-desc">📝 ${inc.descripcion.substring(0, 80)}</div>
                <div class="incident-photos" id="fotos-${inc.id}"></div>
                <div class="incident-footer">
                    <span>${inc.estado === 'critico' ? '🔴 CRÍTICO' : (inc.estado === 'leve' ? '🟡 LEVE' : '🟢 RESUELTO')}</span>
                    <span>📸 ${inc.fotos?.length || 0} foto(s)</span>
                    <span>⏰ ${inc.fecha?.substring(5, 16) || ''}</span>
                </div>
            `;
            div.onclick = () => { map.setView([inc.lat, inc.lng], 16); mostrarToast(`📍 ${inc.nombre}`); };
            container.appendChild(div);
            
            let fotosContainer = document.getElementById(`fotos-${inc.id}`);
            if (inc.fotos && inc.fotos.length > 0) {
                inc.fotos.slice(0, 3).forEach(foto => {
                    let img = document.createElement('img');
                    img.src = foto;
                    img.className = 'incident-photo-mini';
                    img.onclick = (e) => { e.stopPropagation(); verFoto(foto); };
                    fotosContainer.appendChild(img);
                });
                if (inc.fotos.length > 3) fotosContainer.innerHTML += `<span> +${inc.fotos.length-3}</span>`;
            } else {
                fotosContainer.innerHTML = '<span style="font-size:10px; color:#999;">Sin fotos</span>';
            }
        });
    }
    
    function actualizarContadores() {
        let activos = incidentes.filter(i => i.estado === 'critico' || i.estado === 'leve').length;
        let totalFotos = incidentes.reduce((sum, i) => sum + (i.fotos?.length || 0), 0);
        document.getElementById('kpiActivos').innerText = activos;
        document.getElementById('kpiTotal').innerText = incidentes.length;
        document.getElementById('kpiFotos').innerText = totalFotos;
    }
    
    function mostrarToast(msg) {
        let toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
    
    // ============================================
    // INICIAR
    // ============================================
    document.getElementById('refreshBtn').addEventListener('click', () => {
        cargarIncidentesCloud();
    });
    
    initMap();
    cargarIncidentesCloud();
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape') cerrarModal(); });
</script>
</body>
</html>
